services:
  db:
    image: mysql:8.0
    container_name: kyz_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: kyz_logistic
      MYSQL_USER: kyz_user
      MYSQL_PASSWORD: kyz_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kyz_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    command: >
      sh -c "mkdir -p /var/www/html/storage/uploads
      && chown -R www-data:www-data /var/www/html/storage
      && apache2-foreground"

  frontend:
    image: node:20-alpine
    container_name: kyz_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install
      && npm run dev"

  # Artefacto de producción: SIEMPRE usar este servicio (no npm en el host).
  # Desde la raíz del repo: docker compose --profile build run --rm frontend_build
  # Genera frontend/dist/ en el disco del host (listo para subir por FTP).
  frontend_build:
    image: node:20-alpine
    profiles: ["build", "ci"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm ci
      && npm run build"

  backend_check:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["ci"]
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: >
      sh -c "find . -name '*.php' -print0
      | xargs -0 -n1 php -l"

volumes:
  mysql_data:
  frontend_node_modules:
